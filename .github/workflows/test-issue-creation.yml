name: Test Issue Creation

on:
  push:
    branches:
      - main

jobs:
  create-test-issue:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Run test issue creation script
      run: |
        npm install axios
        node scripts/create_test_issue.js
